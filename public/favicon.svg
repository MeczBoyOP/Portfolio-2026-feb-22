<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bf00ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Dark background circle -->
  <circle cx="32" cy="32" r="30" fill="#050510" stroke="url(#g1)" stroke-width="2"/>
  <!-- Outer glow ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#00f5ff" stroke-width="0.5" opacity="0.4"/>
  <!-- < bracket -->
  <polyline points="10,22 6,32 10,42" fill="none" stroke="url(#g1)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- D letter -->
  <text x="16" y="40" font-family="monospace" font-weight="900" font-size="20" fill="url(#g1)" filter="url(#glow)">DN</text>
  <!-- > bracket -->
  <polyline points="54,22 58,32 54,42" fill="none" stroke="url(#g1)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Bottom slash decoration -->
  <line x1="26" y1="48" x2="38" y2="16" stroke="#bf00ff" stroke-width="1" opacity="0.5"/>
</svg>
